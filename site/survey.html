<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Le Tartarughe · How was your stay?</title>
<style>
  :root{--bg:#0f0f10;--card:#1b1b1d;--txt:#f4f3f0;--muted:#a9a7a2;--accent:#e0a400;--line:#2c2c2f;--ok:#25D366;--star:#3a3a3d}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 50px}
  .backlink{display:inline-block;color:var(--muted);text-decoration:none;font-size:14px;margin-bottom:12px}
  .backlink:hover{color:var(--accent)}
  .hero{position:relative;border-radius:16px;overflow:hidden;min-height:140px;display:flex;align-items:center;justify-content:center;text-align:center;
    background:#2a2620 center/cover no-repeat;
    background-image:linear-gradient(rgba(15,15,16,.40),rgba(15,15,16,.72)),url('assets/header.jpg');}
  .hero-title{margin:0;font-size:24px;letter-spacing:3px;font-weight:700;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .hero-sub{margin:6px 0 0;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#e8e4dd}
  .langs{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 4px}
  .langs button{flex:1;min-width:52px;padding:9px 6px;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:10px;font-weight:600;cursor:pointer}
  .langs button.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent)}
  .intro{color:var(--muted);font-size:14px;margin:12px 2px 0}
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
  .q label.lbl{display:block;font-size:15px;font-weight:600;margin-bottom:8px}
  .q .opt{font-size:12px;color:var(--muted);font-weight:400}
  /* star rating */
  .stars{display:inline-flex;flex-direction:row-reverse;justify-content:flex-end}
  .stars input{position:absolute;opacity:0;width:0;height:0}
  .stars label{font-size:36px;line-height:1;color:var(--star);cursor:pointer;padding:0 4px;transition:color .1s}
  .stars label:hover,.stars label:hover ~ label,.stars input:checked ~ label{color:var(--accent)}
  .stars input:focus-visible ~ label{outline:none}
  .scalehint{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:2px;max-width:220px}
  textarea{width:100%;padding:11px;border:1px solid var(--line);background:#101012;color:var(--txt);border-radius:10px;font-size:14px;font-family:inherit;resize:vertical;min-height:84px}
  input[type=text],input[type=email]{width:100%;padding:10px;border:1px solid var(--line);background:#101012;color:var(--txt);border-radius:9px;font-size:14px;margin-top:6px}
  .btn{width:100%;margin-top:16px;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#1a1a1a;font-weight:700;font-size:16px;cursor:pointer}
  .btn:disabled{opacity:.6;cursor:default}
  .privacy{font-size:11px;color:var(--muted);margin:12px 2px 0}
  .msg{font-size:14px;margin:12px 2px 0;display:none}
  .hp{position:absolute;left:-9999px;top:-9999px}
  /* result panels */
  .panel{display:none;text-align:center;margin-top:8px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 20px}
  .panel.show{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .panel .big{font-size:44px;margin:0 0 6px}
  .panel h2{font-size:20px;margin:4px 0 8px}
  .panel p{font-size:14px;color:#d8d6d1;margin:6px 0 0}
  .cta{display:inline-block;margin-top:18px;padding:14px 22px;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px}
  .cta.airbnb{background:#fff;color:#111}
  .cta.wa{background:var(--ok);color:#06310f}
  .cta-hint{font-size:12px;color:var(--muted);margin-top:12px}
  .wa{display:block;text-align:center;margin:22px auto 0;max-width:320px;padding:12px;border-radius:12px;background:#25D366;color:#06310f;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="index.html" id="back">‹ Home</a>
  <header class="hero">
    <div>
      <h1 class="hero-title" id="pt">HOW WAS YOUR STAY?</h1>
      <p class="hero-sub" id="ps">A quick word before you go</p>
    </div>
  </header>

  <div class="langs" id="langs">
    <button data-l="en" class="active">EN</button><button data-l="it">IT</button><button data-l="fr">FR</button><button data-l="es">ES</button><button data-l="de">DE</button>
  </div>

  <p class="intro" id="intro"></p>

  <!-- Netlify form (static so it is detected at build time) -->
  <form name="post-stay-survey" method="POST" data-netlify="true" netlify-honeypot="bot-field" id="survey" action="/">
    <input type="hidden" name="form-name" value="post-stay-survey">
    <input type="hidden" name="lang" id="f_lang" value="en">
    <p class="hp"><label>Don’t fill this out: <input name="bot-field"></label></p>

    <div class="q">
      <label class="lbl" id="q_overall">Overall, how was your stay?</label>
      <div class="stars" id="stars_rating">
        <input type="radio" id="ro5" name="rating" value="5"><label for="ro5" title="5">★</label>
        <input type="radio" id="ro4" name="rating" value="4"><label for="ro4" title="4">★</label>
        <input type="radio" id="ro3" name="rating" value="3"><label for="ro3" title="3">★</label>
        <input type="radio" id="ro2" name="rating" value="2"><label for="ro2" title="2">★</label>
        <input type="radio" id="ro1" name="rating" value="1"><label for="ro1" title="1">★</label>
      </div>
      <div class="scalehint"><span id="sc_lo">Poor</span><span id="sc_hi">Excellent</span></div>
    </div>

    <div class="q">
      <label class="lbl" id="q_checkin">How easy was the self check-in? <span class="opt" id="opt1">(optional)</span></label>
      <div class="stars" id="stars_checkin">
        <input type="radio" id="rc5" name="checkin" value="5"><label for="rc5" title="5">★</label>
        <input type="radio" id="rc4" name="checkin" value="4"><label for="rc4" title="4">★</label>
        <input type="radio" id="rc3" name="checkin" value="3"><label for="rc3" title="3">★</label>
        <input type="radio" id="rc2" name="checkin" value="2"><label for="rc2" title="2">★</label>
        <input type="radio" id="rc1" name="checkin" value="1"><label for="rc1" title="1">★</label>
      </div>
      <div class="scalehint"><span id="sc_lo2">Hard</span><span id="sc_hi2">Very easy</span></div>
    </div>

    <div class="q">
      <label class="lbl" for="comment" id="q_comment">Anything you'd like to tell us? <span class="opt" id="opt2">(optional)</span></label>
      <textarea id="comment" name="comment" maxlength="1500"></textarea>
    </div>

    <div class="q">
      <label class="lbl" for="name" id="q_name">Your name <span class="opt" id="opt3">(optional)</span></label>
      <input type="text" id="name" name="name" autocomplete="name" maxlength="80">
      <label class="lbl" for="email" id="q_email" style="margin-top:12px">Email <span class="opt" id="opt4">(optional — only if you'd like a reply)</span></label>
      <input type="email" id="email" name="email" autocomplete="email" maxlength="120">
    </div>

    <button class="btn" type="submit" id="s_btn">Send feedback</button>
    <p class="privacy" id="privacy"></p>
    <p class="msg" id="msg"></p>
  </form>

  <!-- positive result -->
  <div class="panel" id="panel_pos">
    <p class="big">🐢</p>
    <h2 id="pos_h">Thank you so much!</h2>
    <p id="pos_p"></p>
    <a class="cta airbnb" id="pos_btn" href="#" target="_blank" rel="noopener">⭐ Leave a review on Airbnb</a>
    <p class="cta-hint" id="pos_hint"></p>
  </div>

  <!-- recovery result -->
  <div class="panel" id="panel_neg">
    <p class="big">🙏</p>
    <h2 id="neg_h">Thank you for your honesty</h2>
    <p id="neg_p"></p>
    <a class="cta wa" id="neg_btn" href="#" target="_blank" rel="noopener">💬 Message the host</a>
    <p class="cta-hint" id="neg_hint"></p>
  </div>

  <a class="wa" href="https://wa.me/393296415323" target="_blank" rel="noopener" id="wa_foot">
    💬 <span id="wa_txt">Message the host on WhatsApp</span><br><b>+39 329 641 5323</b>
  </a>
</div>

<script>
/* ============ CONFIG ============ */
// Airbnb listing (confirm/replace with your exact review link if you have one).
// Guests write reviews from "Trips" in the Airbnb app after check-out.
var AIRBNB_REVIEW_URL = "https://www.airbnb.com/rooms/1251290115864398837";
var WA_NUMBER = "393296415323";
/* ================================ */

const T={
 en:{pt:"HOW WAS YOUR STAY?",ps:"A quick word before you go",back:"‹ Home",
   intro:"Thanks for staying at Le Tartarughe 🐢 Your feedback is private and takes under a minute — it helps us make the next stay even better.",
   q_overall:"Overall, how was your stay?",sc_lo:"Poor",sc_hi:"Excellent",
   q_checkin:"How easy was the self check-in?",opt:"(optional)",sc_lo2:"Hard",sc_hi2:"Very easy",
   q_comment:"Anything you'd like to tell us?",
   q_name:"Your name",q_email:"Email",opt_email:"(optional — only if you'd like a reply)",
   s_btn:"Send feedback",sending:"Sending…",
   privacy:"Your feedback goes only to your host. Email and name are optional and used solely to reply to you — never shared, handled per GDPR.",
   need_rating:"Please tap a star rating first.",
   send_err:"Couldn't send just now — please try again, or message us on WhatsApp.",
   pos_h:"Thank you so much! 🐢",
   pos_p:"We're so glad you enjoyed Le Tartarughe. A public review on Airbnb helps other travellers find us — it takes a minute and means the world to a small host.",
   pos_btn:"⭐ Leave a review on Airbnb",
   pos_hint:"Reviews are written from “Trips” in the Airbnb app after check-out.",
   neg_h:"Thank you for your honesty",
   neg_p:"We're sorry it wasn't perfect. We'd genuinely like to make it right — send us a message and we'll help straight away.",
   neg_btn:"💬 Message the host",
   neg_hint:"We usually reply within minutes.",
   wa:"Message the host on WhatsApp",
   wa_recover:"Hi! I just left feedback about my stay at Le Tartarughe and I'd like to share something."},
 it:{pt:"COM'È ANDATO IL SOGGIORNO?",ps:"Due parole prima di partire",back:"‹ Home",
   intro:"Grazie per aver soggiornato a Le Tartarughe 🐢 Il tuo parere è privato e richiede meno di un minuto — ci aiuta a rendere ancora migliore il prossimo soggiorno.",
   q_overall:"In generale, com'è andato il soggiorno?",sc_lo:"Scarso",sc_hi:"Ottimo",
   q_checkin:"Quanto è stato facile il self check-in?",opt:"(facoltativo)",sc_lo2:"Difficile",sc_hi2:"Facilissimo",
   q_comment:"Vuoi dirci qualcosa?",
   q_name:"Il tuo nome",q_email:"Email",opt_email:"(facoltativa — solo se vuoi una risposta)",
   s_btn:"Invia il tuo parere",sending:"Invio…",
   privacy:"Il tuo parere arriva solo al tuo host. Email e nome sono facoltativi e servono solo a risponderti — mai condivisi, trattati nel rispetto del GDPR.",
   need_rating:"Tocca prima una valutazione a stelle.",
   send_err:"Non è stato possibile inviare ora — riprova, oppure scrivici su WhatsApp.",
   pos_h:"Grazie di cuore! 🐢",
   pos_p:"Siamo felicissimi che ti sia trovato bene a Le Tartarughe. Una recensione pubblica su Airbnb aiuta altri viaggiatori a trovarci — richiede un minuto e per un piccolo host vale tantissimo.",
   pos_btn:"⭐ Lascia una recensione su Airbnb",
   pos_hint:"Le recensioni si scrivono da “Viaggi” nell'app Airbnb dopo il check-out.",
   neg_h:"Grazie per la sincerità",
   neg_p:"Ci dispiace non sia stato perfetto. Vogliamo davvero rimediare — scrivici un messaggio e ti aiutiamo subito.",
   neg_btn:"💬 Scrivi all'host",
   neg_hint:"Di solito rispondiamo in pochi minuti.",
   wa:"Scrivi all'host su WhatsApp",
   wa_recover:"Ciao! Ho appena lasciato un parere sul mio soggiorno a Le Tartarughe e vorrei segnalarti una cosa."}
};
T.fr=T.en;T.es=T.en;T.de=T.en; // fallback (same as the rest of the site)

const $=id=>document.getElementById(id);
function cur(){const s=localStorage.getItem('lt_lang')||(navigator.language||'en').slice(0,2);return T[s]?s:'en';}

function render(l){
 const d=T[l];
 $('pt').textContent=d.pt; $('ps').textContent=d.ps; $('back').textContent=d.back;
 $('intro').textContent=d.intro;
 $('q_overall').textContent=d.q_overall; $('sc_lo').textContent=d.sc_lo; $('sc_hi').textContent=d.sc_hi;
 $('q_checkin').firstChild.textContent=d.q_checkin+' '; $('opt1').textContent=d.opt;
 $('sc_lo2').textContent=d.sc_lo2; $('sc_hi2').textContent=d.sc_hi2;
 $('q_comment').firstChild.textContent=d.q_comment+' '; $('opt2').textContent=d.opt;
 $('q_name').firstChild.textContent=d.q_name+' '; $('opt3').textContent=d.opt;
 $('q_email').firstChild.textContent=d.q_email+' '; $('opt4').textContent=d.opt_email;
 $('s_btn').textContent=d.s_btn;
 $('privacy').textContent=d.privacy;
 $('pos_h').textContent=d.pos_h; $('pos_p').textContent=d.pos_p; $('pos_btn').textContent=d.pos_btn; $('pos_hint').textContent=d.pos_hint;
 $('neg_h').textContent=d.neg_h; $('neg_p').textContent=d.neg_p; $('neg_btn').textContent=d.neg_btn; $('neg_hint').textContent=d.neg_hint;
 $('wa_txt').textContent=d.wa;
 $('f_lang').value=l;
 document.documentElement.lang=l;
 document.querySelectorAll('#langs button').forEach(b=>b.classList.toggle('active',b.dataset.l===l));
}
$('langs').addEventListener('click',e=>{if(e.target.dataset.l){localStorage.setItem('lt_lang',e.target.dataset.l);render(e.target.dataset.l);}});

function gc(name){try{if(window.goatcounter&&window.goatcounter.count)window.goatcounter.count({path:name,event:true});}catch(e){}}

function encode(data){return Object.keys(data).map(k=>encodeURIComponent(k)+'='+encodeURIComponent(data[k])).join('&');}

$('survey').addEventListener('submit',function(e){
 e.preventDefault();
 const d=T[cur()];
 const rEl=document.querySelector('input[name=rating]:checked');
 if(!rEl){msg(d.need_rating,false);return;}
 const rating=parseInt(rEl.value,10);
 const cEl=document.querySelector('input[name=checkin]:checked');
 const btn=$('s_btn'); btn.disabled=true; const orig=btn.textContent; btn.textContent=d.sending; hideMsg();

 const body={
   'form-name':'post-stay-survey',
   'lang':cur(),
   'rating':String(rating),
   'checkin':cEl?cEl.value:'',
   'comment':$('comment').value.trim(),
   'name':$('name').value.trim(),
   'email':$('email').value.trim()
 };
 gc('survey-submit'); gc('survey-rating-'+rating);

 fetch('/',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:encode(body)})
  .then(function(r){ if(!r.ok) throw new Error('http'); finish(rating); })
  .catch(function(){ btn.disabled=false; btn.textContent=orig; msg(d.send_err,false); });
});

function finish(rating){
 const d=T[cur()];
 $('survey').style.display='none';
 if(rating>=5){
   const a=$('pos_btn'); a.href=AIRBNB_REVIEW_URL;
   a.addEventListener('click',function(){gc('survey-review-click');});
   $('panel_pos').classList.add('show');
   $('panel_pos').scrollIntoView({behavior:'smooth',block:'center'});
 }else{
   const a=$('neg_btn');
   a.href='https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent(d.wa_recover);
   $('panel_neg').classList.add('show');
   $('panel_neg').scrollIntoView({behavior:'smooth',block:'center'});
 }
}

function msg(txt,ok){const m=$('msg');m.textContent=txt;m.style.display='block';m.style.color=ok?'#7ed98f':'#e0a4a4';}
function hideMsg(){$('msg').style.display='none';}

render(cur());
</script>

<style>
.hb{position:fixed;top:12px;right:12px;z-index:60;background:rgba(27,27,29,.92);border:1px solid #2c2c2f;color:#f4f3f0;width:42px;height:42px;border-radius:10px;font-size:20px;cursor:pointer}
.hbmenu{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:59;display:none}
.hbmenu.open{display:block}
.hbmenu .panel{position:absolute;top:0;right:0;width:255px;max-width:82%;height:100%;background:#1b1b1d;border-left:1px solid #2c2c2f;padding:64px 16px 16px;box-shadow:-6px 0 24px rgba(0,0,0,.45)}
.hbmenu a{display:block;color:#f4f3f0;text-decoration:none;padding:12px 10px;border-radius:9px;font-size:15px}
.hbmenu a.cur{color:#e0a400}
</style>
<button class="hb" id="hbBtn" aria-label="Menu">☰</button>
<div class="hbmenu" id="hbMenu"><div class="panel" id="hbPanel"></div></div>
<script>
(function(){var CUR="survey.html";
var M={en:["🏠 Home","🔑 Self check-in","🛋️ Inside the apartment","🗺️ Neighbourhood","🎭 During your stay"],it:["🏠 Home","🔑 Self check-in","🛋️ Dentro l'appartamento","🗺️ Quartiere","🎭 Durante il soggiorno"],fr:["🏠 Accueil","🔑 Arrivée autonome","🛋️ Dans l'appartement","🗺️ Quartier","🎭 Pendant le séjour"],es:["🏠 Inicio","🔑 Check-in autónomo","🛋️ Dentro del apartamento","🗺️ Barrio","🎭 Durante la estancia"],de:["🏠 Start","🔑 Self check-in","🛋️ In der Wohnung","🗺️ Viertel","🎭 Während des Aufenthalts"]};
var P=["index.html","checkin.html","inside.html","neighbourhood.html","stay.html"];
function build(l){if(!M[l])l='en';document.getElementById('hbPanel').innerHTML=M[l].map(function(t,i){return '<a href="'+P[i]+'"'+(P[i]===CUR?' class="cur"':'')+'>'+t+'</a>';}).join('');}
build(localStorage.getItem('lt_lang')||(navigator.language||'en').slice(0,2));
var lg=document.getElementById('langs'); if(lg)lg.addEventListener('click',function(e){if(e.target.dataset.l)build(e.target.dataset.l);});
var menu=document.getElementById('hbMenu');
document.getElementById('hbBtn').onclick=function(){menu.classList.toggle('open');};
menu.onclick=function(e){if(e.target===menu)menu.classList.remove('open');};
})();
</script>
<script src="analytics.js" defer></script>
</body>
</html>
