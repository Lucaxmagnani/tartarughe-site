<!doctype html>

<head>

<title>Le Tartarughe · Self check-in</title>
<style>
  :root{--bg:#0f0f10;--card:#1b1b1d;--txt:#f4f3f0;--muted:#a9a7a2;--accent:#e0a400;--line:#2c2c2f;--green:#2e9e5b}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.55}
  .wrap{max-width:520px;margin:0 auto;padding:18px 16px 60px}
  .home{display:inline-block;color:var(--accent);text-decoration:none;font-size:13px;margin-bottom:8px}
  .hero{position:relative;border-radius:14px;overflow:hidden;margin-bottom:6px;min-height:150px;display:flex;align-items:center;justify-content:center;text-align:center;
    background:#2a2620 center/cover no-repeat;
    background-image:linear-gradient(rgba(15,15,16,.40),rgba(15,15,16,.72)),url('assets/header.jpg');}
  .hero-title{margin:0;font-size:30px;letter-spacing:5px;font-weight:700;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .hero-sub{margin:6px 0 0;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#e8e4dd}
  .hero-inner{padding:26px 16px}
  .langs{position:sticky;top:0;background:var(--bg);display:flex;gap:6px;flex-wrap:wrap;padding:12px 0;z-index:5}
  .langs button{flex:1;min-width:52px;padding:9px 6px;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:10px;font-weight:600;cursor:pointer}
  .langs button.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent)}
  h2{font-size:17px;margin:26px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .ytwrap{position:relative;width:100%;max-width:340px;margin:6px auto 14px;aspect-ratio:9/16;border-radius:14px;overflow:hidden;background:#000}
  .ytwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .keys{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 16px;margin:6px 0}
  .keys h3{margin:0 0 8px;font-size:14px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
  .keys ul{margin:0;padding-left:18px}
  .keys li{margin:4px 0}
  .keysimg{width:100%;border-radius:10px;margin-top:12px;display:block}
  .ytlink{text-align:center;margin:-8px 0 16px;font-size:13px}
  .step{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin:10px 0}
  .step .n{display:inline-block;background:var(--accent);color:#1a1a1a;font-weight:700;border-radius:8px;padding:1px 9px;font-size:13px;margin-bottom:6px}
  .step p{margin:6px 0 0}
  .warn{color:#ffd24a}
  .note{color:var(--muted);font-size:13px;margin-top:18px;text-align:center}
  .wa{display:block;text-align:center;margin:16px auto 0;max-width:320px;padding:12px;border-radius:12px;background:#25D366;color:#06310f;text-decoration:none;font-weight:600}
  .wa b{font-size:16px}
  .soon{font-size:12px;color:var(--muted);font-style:italic}
</style>
</head>

const $=id=>document.getElementById(id);
function stepHTML(arr){return arr.map(([n,b])=>`<div class="step"><span class="n">${n}</span><p>${b}</p></div>`).join('');}
function render(l){
  const d=L[l];
  $('keys_h').textContent=d.keys_h;
  $('keys_list').innerHTML=d.keys.map(k=>`<li>${k}</li>`).join('');
  $('checkin_h').textContent=d.ci; $('checkout_h').textContent=d.co; $('during_h').textContent=d.during;
  $('checkin_steps').innerHTML=stepHTML(d.cis);
  $('checkout_steps').innerHTML=stepHTML(d.cos);
  $('during_p').textContent=d.during_p; $('during_soon').textContent='';
  $('help').textContent=d.help;
  document.documentElement.lang=l;
  document.querySelectorAll('#langs button').forEach(b=>b.classList.toggle('active',b.dataset.l===l));
}
$('langs').addEventListener('click',e=>{if(e.target.dataset.l){localStorage.setItem('lt_lang',e.target.dataset.l);render(e.target.dataset.l);}});
const _sl=localStorage.getItem('lt_lang')||(navigator.language||'en').slice(0,2);
render(L[_sl]?_sl:'en');

.hbmenu{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:59;display:none}
.hbmenu.open{display:block}
.hbmenu .panel{position:absolute;top:0;right:0;width:255px;max-width:82%;height:100%;background:#1b1b1d;border-left:1px solid #2c2c2f;padding:64px 16px 16px;box-shadow:-6px 0 24px rgba(0,0,0,.45)}
.hbmenu a{display:block;color:#f4f3f0;text-decoration:none;padding:12px 10px;border-radius:9px;font-size:15px}
.hbmenu a.cur{color:#e0a400}
</style>
<button class="hb" id="hbBtn" aria-label="Menu">☰</button>
<div class="hbmenu" id="hbMenu"><div class="panel" id="hbPanel"></div></div>
<script>
(function(){var CUR="checkin.html";
var M={en:["🏠 Home","🔑 Self check-in","🛋️ Inside the apartment","🗺️ Neighbourhood"],it:["🏠 Home","🔑 Self check-in","🛋️ Dentro l'appartamento","🗺️ Quartiere"],fr:["🏠 Accueil","🔑 Arrivée autonome","🛋️ Dans l'appartement","🗺️ Quartier"],es:["🏠 Inicio","🔑 Check-in autónomo","🛋️ Dentro del apartamento","🗺️ Barrio"],de:["🏠 Start","🔑 Self check-in","🛋️ In der Wohnung","🗺️ Viertel"]};
var P=["index.html","checkin.html","inside.html","neighbourhood.html"];
function build(l){if(!M[l])l='en';document.getElementById('hbPanel').innerHTML=M[l].map(function(t,i){return '<a href="'+P[i]+'"'+(P[i]===CUR?' class="cur"':'')+'>'+t+'</a>';}).join('');}
build(localStorage.getItem('lt_lang')||(navigator.language||'en').slice(0,2));
var lg=document.getElementById('langs'); if(lg)lg.addEventListener('click',function(e){if(e.target.dataset.l)build(e.target.dataset.l);});
var menu=document.getElementById('hbMenu');
document.getElementById('hbBtn').onclick=function(){menu.classList.toggle('open');};
menu.onclick=function(e){if(e.target===menu)menu.classList.remove('open');};
})();
</script>
</body>
</html>
