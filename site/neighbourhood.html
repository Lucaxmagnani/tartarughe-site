const $=id=>document.getElementById(id);
function maps(n,a){return "https://www.google.com/maps/dir/?api=1&origin="+encodeURIComponent("Via della Reginella 2, Roma")+"&destination="+encodeURIComponent(n+" "+a)+"&travelmode=walking";}
function kmTxt(v,l){return v<=0?"":(String(v).replace('.',l==='it'||l==='fr'||l==='es'||l==='de'?',':'.')+" "+T[l].km);}
function card(it,l,withDesc){
  const k = it.km>0?`<span class="km">${kmTxt(it.km,l)}</span>`:"";
  const d = (withDesc&&it.d)?`<div class="desc">${it.d[l]}</div>`:"";
  return `<div class="item"><div class="top"><b>${it.n}</b>${k}</div>${d}<div class="addr">${it.a}</div>
    <a href="${maps(it.n,it.a)}" target="_blank" rel="noopener">📍 ${T[l].map}</a></div>`;
}
function render(l){
  const d=T[l];
  $('title').textContent=d.title; $('lead').textContent=d.lead;
  $('nav').innerHTML=`<a href="#h_arrive">${d.nav.arrive}</a><a href="#h_around">${d.nav.around}</a><a href="#h_essentials">${d.nav.ess}</a><a href="#h_sights">${d.nav.sights}</a><a href="#h_eat">${d.nav.eat}</a>`;
  $('h_arrive').textContent=d.hArrive; $('h_around').textContent=d.hAround; $('h_essentials').textContent=d.hEss; $('h_sights').textContent=d.hSights; $('h_eat').textContent=d.hEat;
  $('p_fco').innerHTML=d.fco; $('p_cia').innerHTML=d.cia; $('p_termini').innerHTML=d.termini;
  $('p_around').innerHTML=d.around; $('p_pharm').innerHTML=d.pharm; $('p_market').innerHTML=d.market;
  $('t_tratt').textContent=d.tratt; $('t_pizza').textContent=d.pizza; $('t_dolci').textContent=d.dolci; $('t_bars').textContent=d.bars;
  $('c_tratt').innerHTML=TRATT.map(i=>card(i,l,true)).join('');
  $('c_pizza').innerHTML=PIZZA.map(i=>card(i,l,true)).join('');
  $('c_dolci').innerHTML=DOLCI.map(i=>card(i,l,true)).join('');
  $('c_bars').innerHTML=BARS.map(i=>card(i,l,true)).join('');
  $('c_sights').innerHTML=SIGHTS.map(i=>card(i,l,false)).join('');
  document.documentElement.lang=l;
  document.querySelectorAll('#langs button').forEach(b=>b.classList.toggle('active',b.dataset.l===l));
}
$('langs').addEventListener('click',e=>{if(e.target.dataset.l){localStorage.setItem('lt_lang',e.target.dataset.l);render(e.target.dataset.l);}});
const _sl=localStorage.getItem('lt_lang')||(navigator.language||'en').slice(0,2);
render(T[_sl]?_sl:'en');
</script>
<style>

</style>

<script>
(function(){var CUR="neighbourhood.html";
var M={en:["🏠 Home","🔑 Self check-in","🛋️ Inside the apartment","🗺️ Neighbourhood"],it:["🏠 Home","🔑 Self check-in","🛋️ Dentro l'appartamento","🗺️ Quartiere"],fr:["🏠 Accueil","🔑 Arrivée autonome","🛋️ Dans l'appartement","🗺️ Quartier"],es:["🏠 Inicio","🔑 Check-in autónomo","🛋️ Dentro del apartamento","🗺️ Barrio"],de:["🏠 Start","🔑 Self check-in","🛋️ In der Wohnung","🗺️ Viertel"]};
var P=["index.html","checkin.html","inside.html","neighbourhood.html"];
function build(l){if(!M[l])l='en';document.getElementById('hbPanel').innerHTML=M[l].map(function(t,i){return '<a href="'+P[i]+'"'+(P[i]===CUR?' class="cur"':'')+'>'+t+'</a>';}).join('');}
build(localStorage.getItem('lt_lang')||(navigator.language||'en').slice(0,2));
var lg=document.getElementById('langs'); if(lg)lg.addEventListener('click',function(e){if(e.target.dataset.l)build(e.target.dataset.l);});
var menu=document.getElementById('hbMenu');
document.getElementById('hbBtn').onclick=function(){menu.classList.toggle('open');};
menu.onclick=function(e){if(e.target===menu)menu.classList.remove('open');};
})();
</script>
