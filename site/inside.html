<!doctype html>

<title>Le Tartarughe · Inside the apartment</title>
<style>
  :root{--bg:#0f0f10;--card:#1b1b1d;--txt:#f4f3f0;--muted:#a9a7a2;--accent:#e0a400;--line:#2c2c2f}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.5}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 60px}
  .home{display:inline-block;color:var(--accent);text-decoration:none;font-size:13px;margin-bottom:6px}
  h1{font-size:22px;margin:4px 0 2px}
  .lead{color:var(--muted);font-size:14px;margin:0 0 8px}
  .langs{position:sticky;top:0;background:var(--bg);display:flex;gap:6px;flex-wrap:wrap;padding:10px 0;z-index:5}
  .langs button{flex:1;min-width:48px;padding:8px 5px;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:9px;font-weight:600;cursor:pointer;font-size:13px}
  .langs button.active{background:var(--accent);color:#1a1a1a;border-color:var(--accent)}
  .item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin:9px 0}
  .item .ic{font-size:20px}
  .item b{font-size:15px;margin-left:6px}
  .item p{margin:6px 0 0;font-size:14px;color:#d8d5cf}
  .item p b{margin-left:0;font-size:14px}
  .soon{display:inline-block;margin-top:8px;font-size:12px;color:#ffd24a;background:#3a2a00;border:1px solid var(--accent);border-radius:7px;padding:2px 8px}
  .vid{display:inline-block;margin-top:8px;font-size:13px;font-weight:600;color:#1a1a1a;background:var(--accent);border-radius:8px;padding:5px 12px;text-decoration:none}
  .ytwrap{position:relative;width:100%;max-width:300px;margin:10px auto 4px;aspect-ratio:9/16;border-radius:12px;overflow:hidden;background:#000}
  .ytwrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .wifi{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:14px 15px;margin:9px 0}
  .wifi .row{font-size:15px;margin:4px 0}
  .wifi code{background:#000;padding:2px 8px;border-radius:6px;color:#ffd24a;font-size:15px}
</style>
</head>

const $=id=>document.getElementById(id);
function render(l){const d=T[l];
  $('title').textContent=d.title; $('lead').textContent=d.lead;
  $('wifi_h').textContent=d.wifi;
  $('wifi_net').innerHTML=`<b>${d.net}:</b> <code>${WIFI_SSID}</code>`;
  $('wifi_pw').innerHTML=`<b>${d.pw}:</b> ${d.pwVal}`;
  $('items').innerHTML=d.items.map((it,i)=>`<div class="item"><span class="ic">${it[0]}</span><b>${it[1]}</b><p>${it[2]}</p>${i===1?`<div class="ytwrap"><iframe src="https://www.youtube.com/embed/5I7huXUv8sk" allowfullscreen loading="lazy"></iframe></div>`:''}</div>`).join('');
  document.documentElement.lang=l;
  document.querySelectorAll('#langs button').forEach(b=>b.classList.toggle('active',b.dataset.l===l));
}
$('langs').addEventListener('click',e=>{if(e.target.dataset.l){localStorage.setItem('lt_lang',e.target.dataset.l);render(e.target.dataset.l);}});
const _sl=localStorage.getItem('lt_lang')||(navigator.language||'en').slice(0,2);
render(T[_sl]?_sl:'en');

<style>
.hb{position:fixed;top:12px;right:12px;z-index:60;background:rgba(27,27,29,.92);border:1px solid #2c2c2f;color:#f4f3f0;width:42px;height:42px;border-radius:10px;font-size:20px;cursor:pointer}

.hbmenu .panel{position:absolute;top:0;right:0;width:255px;max-width:82%;height:100%;background:#1b1b1d;border-left:1px solid #2c2c2f;padding:64px 16px 16px;box-shadow:-6px 0 24px rgba(0,0,0,.45)}

.hbmenu a.cur{color:#e0a400}
</style>
<button class="hb" id="hbBtn" aria-label="Menu">☰</button>
<div class="hbmenu" id="hbMenu"><div class="panel" id="hbPanel"></div></div>
<script>
(function(){var CUR="inside.html";
var M={en:["🏠 Home","🔑 Self check-in","🛋️ Inside the apartment","🗺️ Neighbourhood"],it:["🏠 Home","🔑 Self check-in","🛋️ Dentro l'appartamento","🗺️ Quartiere"],fr:["🏠 Accueil","🔑 Arrivée autonome","🛋️ Dans l'appartement","🗺️ Quartier"],es:["🏠 Inicio","🔑 Check-in autónomo","🛋️ Dentro del apartamento","🗺️ Barrio"],de:["🏠 Start","🔑 Self check-in","🛋️ In der Wohnung","🗺️ Viertel"]};
var P=["index.html","checkin.html","inside.html","neighbourhood.html"];
function build(l){if(!M[l])l='en';document.getElementById('hbPanel').innerHTML=M[l].map(function(t,i){return '<a href="'+P[i]+'"'+(P[i]===CUR?' class="cur"':'')+'>'+t+'</a>';}).join('');}
build(localStorage.getItem('lt_lang')||(navigator.language||'en').slice(0,2));
var lg=document.getElementById('langs'); if(lg)lg.addEventListener('click',function(e){if(e.target.dataset.l)build(e.target.dataset.l);});
var menu=document.getElementById('hbMenu');
document.getElementById('hbBtn').onclick=function(){menu.classList.toggle('open');};
menu.onclick=function(e){if(e.target===menu)menu.classList.remove('open');};
})();
</script>
