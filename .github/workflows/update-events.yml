name: Daily events update

on:
  schedule:
    - cron: "30 4 * * *"   # 04:30 UTC = 06:30 a Roma (ora legale)
  workflow_dispatch: {}     # bottone per lancio manuale nella tab Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update events.json
        run: python scripts/update_events.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet site/events.json; then
            echo "No changes — nothing to commit."
          else
            git config user.name "events-bot"
            git config user.email "actions@github.com"
            git add site/events.json
            git commit -m "chore: daily events update $(date -u +%F)"
            git push
          fi
